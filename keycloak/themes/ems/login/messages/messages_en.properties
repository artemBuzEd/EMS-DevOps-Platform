# Brand + copy overrides. All other keys fall through to the base theme so we
# never hardcode flow strings (MFA, reset, terms, validation) — Keycloak still
# serves them and any other configured language.

# Header wordmark shown on every login-flow page (kcSanitize keeps the span).
loginTitleHtml=<span class="ems-brand">EventPro</span>

# Page headline on the sign-in screen.
loginAccountTitle=Sign in to EventPro

# Subtitle rendered by our login.ftl shell override.
emsLoginSubtitle=Event management for high-stakes production.
