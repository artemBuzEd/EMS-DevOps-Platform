# EMS (Obsidian Event Logic) login theme.
# Extend the stock `keycloak` theme so we inherit its PatternFly base + all
# FreeMarker templates (login, register, reset-password, MFA, IdP, terms, ...).
# We only ship a CSS layer + a couple of message overrides on top — every
# flow-specific template keeps working untouched.
parent=keycloak
import=common/keycloak

styles=css/styles.css

meta=viewport==width=device-width,initial-scale=1
