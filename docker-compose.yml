volumes:
  postgres_data:
  mongo_data:
  keycloak_data:
  user_uploads:
  event_uploads:

services:
  postgres:
    image: postgres:17.6
    container_name: postgres_db
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_USER_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./Services/EventManagmentSystem/init-venues-db.sql:/docker-entrypoint-initdb.d/init-venues-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_USER_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
  redis:
    image: redis:8.2
    container_name: redis
    command: ["redis-server", "--requirepass", "${REDIS_REQUIREPASS}"]
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD-SHELL", "redis-cli", "-a",  "${REDIS_REQUIREPASS}", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
  mongo:
    image: mongo:8.0
    container_name: mongo
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_INITDB_ROOT_USERNAME}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_INITDB_ROOT_PASSWORD}
    ports:
      - "24654:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: >
        mongosh --quiet
        -u ${MONGO_INITDB_ROOT_USERNAME}
        -p ${MONGO_INITDB_ROOT_PASSWORD}
        --authenticationDatabase admin
        --eval "db.runCommand({ping: 1}).ok"
      interval: 10s
      timeout: 5s
      retries: 5

  # Keycloak identity provider
  keycloak-db:
    image: postgres:17.6
    container_name: keycloak_db
    environment:
      - POSTGRES_DB=keycloak
      - POSTGRES_USER=keycloak
      - POSTGRES_PASSWORD=${KEYCLOAK_DB_PASSWORD}
    volumes:
      - keycloak_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak -d keycloak"]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: keycloak
    # LOCAL-ONLY 'start' production mode in deployment
    command: start-dev --import-realm
    environment:
      - KC_DB=postgres
      - KC_DB_URL=jdbc:postgresql://keycloak-db:5432/keycloak
      - KC_DB_USERNAME=keycloak
      - KC_DB_PASSWORD=${KEYCLOAK_DB_PASSWORD}
      - KC_BOOTSTRAP_ADMIN_USERNAME=${KEYCLOAK_ADMIN}
      - KC_BOOTSTRAP_ADMIN_PASSWORD=${KEYCLOAK_ADMIN_PASSWORD}
      - KC_HEALTH_ENABLED=true
      - KC_HOSTNAME=http://localhost:8180
      - KC_HOSTNAME_BACKCHANNEL_DYNAMIC=true
    ports:
      - "8180:8080"
    volumes:
      - ./keycloak/realm-ems.json:/opt/keycloak/data/import/realm-ems.json:ro
    depends_on:
      keycloak-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/9000 && echo -e 'GET /health/ready HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n' >&3 && cat <&3 | grep -q '200 OK'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  user-profile-service:
    platform: linux/amd64
    build:
      context: .
      dockerfile: Services/UserProfileService/Dockerfile
    environment:
      - ConnectionStrings__UserProfileDb=Host=postgres;Port=5432;Database=${POSTGRES_USER_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};
      - ConnectionStrings__Redis=redis:6379,password=${REDIS_REQUIREPASS}
      - Kestrel__Endpoints__Rest__Url=http://*:8080
      - Kestrel__Endpoints__Rest__Protocols=Http1
      - Kestrel__Endpoints__Grpc__Url=http://*:50051
      - Kestrel__Endpoints__Grpc__Protocols=Http2
      - Keycloak__Authority=http://keycloak:8080/realms/ems
      - Keycloak__Audience=ems-api
      - Keycloak__RequireHttpsMetadata=false
      - FileStorage__BasePath=/app/uploads
      - FileStorage__BaseUrl=/uploads
    ports:
      - "8080:8080"
    volumes:
      - user_uploads:/app/uploads
    depends_on:
      postgres:
          condition: service_healthy
      redis:
        condition: service_healthy
      keycloak:
        condition: service_healthy

  event-catalog-service:
    platform: linux/amd64
    build:
      context: .
      dockerfile: Services/EventCatalogService/Dockerfile
    environment:
      - ConnectionStrings__EventCatalogDb=mongodb://${MONGO_INITDB_ROOT_USERNAME}:${MONGO_INITDB_ROOT_PASSWORD}@mongo:27017/EventCatalogDb?authSource=admin&authMechanism=SCRAM-SHA-256
      - ConnectionStrings__Redis=redis:6379,password=${REDIS_REQUIREPASS}
      - Kestrel__Endpoints__Rest__Url=http://*:8080
      - Kestrel__Endpoints__Rest__Protocols=Http1
      - Kestrel__Endpoints__Grpc__Url=http://*:50051
      - Kestrel__Endpoints__Grpc__Protocols=Http2
      - Keycloak__Authority=http://keycloak:8080/realms/ems
      - Keycloak__Audience=ems-api
      - Keycloak__RequireHttpsMetadata=false
      - FileStorage__BasePath=/app/uploads
      - FileStorage__BaseUrl=/uploads
    ports:
      - "8081:8080"
    volumes:
      - event_uploads:/app/uploads
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      keycloak:
        condition: service_healthy

  venue-service:
    build:
      context: .
      dockerfile: Services/EventManagmentSystem/Dockerfile
    environment:
      - ConnectionStrings__VenueDb=Host=postgres;Port=5432;Database=${POSTGRES_VENUE_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};
      - ConnectionStrings__Redis=redis:6379,password=${REDIS_REQUIREPASS}
      - Keycloak__Authority=http://keycloak:8080/realms/ems
      - Keycloak__Audience=ems-api
      - Keycloak__RequireHttpsMetadata=false
    ports:
      - "8082:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      keycloak:
        condition: service_healthy

  aggregator-service:
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    platform: linux/amd64
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - ConnectionStrings__Redis=redis:6379,password=${REDIS_REQUIREPASS}
      - services__EventCatalogService__http__0=http://event-catalog-service:8080
      - services__EventCatalogService__https__0=http://event-catalog-service:8080
      - services__EventCatalogService__grpc__0=http://event-catalog-service:50051
      - services__UserProfileService__grpc__0=http://user-profile-service:50051
      - services__UserProfileService__http__0=http://user-profile-service:8080
      - services__UserProfileService__https__0=http://user-profile-service:8080
      - services__VenueService__http__0=http://venue-service:8080
      - services__VenueService__https__0=http://venue-service:8080
      - Keycloak__Authority=http://keycloak:8080/realms/ems
      - Keycloak__Audience=ems-api
      - Keycloak__RequireHttpsMetadata=false
    ports:
      - "8083:8080"
    depends_on:
      redis:
        condition: service_healthy
      event-catalog-service:
        condition: service_started
      venue-service:
        condition: service_started
      user-profile-service:
        condition: service_started
  
  api-gateway:
    platform: linux/amd64
    build:
      context: .
      dockerfile: ApiGateway/Dockerfile
    environment:
      - Keycloak__Authority=http://keycloak:8080/realms/ems
      - Keycloak__Audience=ems-api
      - Keycloak__RequireHttpsMetadata=false
      - services__EventCatalogService__http__0=http://event-catalog-service:8080
      - services__EventCatalogService__https__0=http://event-catalog-service:8080
      - services__UserProfileService__http__0=http://user-profile-service:8080
      - services__UserProfileService__https__0=http://user-profile-service:8080
      - services__VenueService__http__0=http://venue-service:8080
      - services__VenueService__https__0=http://venue-service:8080
      - services__Aggregator__http__0=http://aggregator-service:8080
      - services__Aggregator__https__0=http://aggregator-service:8080
    ports:
      - "10000:8080"
    depends_on:
      keycloak:
        condition: service_healthy
      user-profile-service:
        condition: service_started
      event-catalog-service:
        condition: service_started
      venue-service:
        condition: service_started
      aggregator-service:
        condition: service_started